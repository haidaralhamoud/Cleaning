<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; background: #f7fafc; padding: 24px;">
    <div style="max-width: 520px; margin: 0 auto; background: #ffffff; border-radius: 14px; padding: 28px; border: 1px solid #e5e7eb;">
      <h2 style="margin: 0 0 8px; color: #0f172a;">Password reset code</h2>
      <p style="margin: 0 0 18px; color: #475569;">Use the code below to reset your password.</p>
      <div style="text-align: center; margin: 18px 0 8px;">
        <div style="font-size: 28px; font-weight: 700; letter-spacing: 6px; color: #0f172a; background: #f8fafc; padding: 14px 18px; border-radius: 12px; display: inline-block;">
          {{ code }}
        </div>
      </div>
      <p style="margin: 12px 0 0; color: #475569;">This code expires in <strong>{{ ttl }} minutes</strong>.</p>
      <p style="margin: 16px 0 0; color: #64748b;">If you didn’t request this, please ignore this email or secure your account.</p>
      <p style="margin: 20px 0 0; color: #0f172a; font-weight: 600;">Hembla Experten</p>
    </div>
  </body>
</html>
