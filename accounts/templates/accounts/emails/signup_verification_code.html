<div style="font-family: Arial, sans-serif; background: #f8fafc; padding: 24px;">
  <div style="max-width: 520px; margin: 0 auto; background: #ffffff; border-radius: 16px; padding: 28px; border: 1px solid #e2e8f0;">
    <h2 style="margin: 0 0 8px; color: #0f172a;">Verify your email</h2>
    <p style="margin: 0 0 18px; color: #475569;">Use the code below to activate your Hembla experten account.</p>
    <div style="font-size: 32px; line-height: 1; font-weight: 700; letter-spacing: 8px; color: #039fc8; margin: 0 0 18px;">
      {{ code }}
    </div>
    <p style="margin: 12px 0 0; color: #475569;">This code expires in <strong>{{ ttl }} minutes</strong>.</p>
  </div>
</div>
