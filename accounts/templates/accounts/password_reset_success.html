{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated | Hembla experten</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/main_header.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
{% include "home/includes/main_header.html" %}

<main class="signin-container">
  <div class="signin-box reset-box">
    <img src="{% static 'images/confetti0.png'%}" alt="Confetti" class="confetti">

    <h1 class="title">Password updated</h1>
    <p class="subtitle">You can now log in with your new password.</p>

    <a class="btn-login" href="{% url 'login' %}?email={{ request.GET.email|urlencode }}">Back to login</a>
  </div>
</main>

{% include "home/includes/footer.html" %}

<script src="{% static 'js/main_header.js' %}"></script>
</body>
</html>
