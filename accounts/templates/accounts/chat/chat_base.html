{% load static %}
<link rel="stylesheet" href="{% static 'css/chat.css' %}">

<style>
.chat-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  max-width: 900px;
  margin: 30px auto;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

.chat-thread {
  max-height: 420px;
  overflow-y: auto;
  padding: 10px;
}

.message {
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
}

.message--out { align-items: flex-end; }
.message--in { align-items: flex-start; }

.message__bubble {
  padding: 12px 16px;
  border-radius: 18px;
  max-width: 70%;
  line-height: 1.4;
}

.message--out .message__bubble {
  background: #173da6;
  color: #fff;
  border-bottom-right-radius: 4px;
}

.message--in .message__bubble {
  background: #f1f1f1;
  border-bottom-left-radius: 4px;
}

.message__meta {
  font-size: 12px;
  opacity: .6;
  margin-top: 4px;
}

.composer {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  align-items: center;
}

.composer input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

.icon-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.send-btn {
  background: #173da6;
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 12px;
}
</style>

<section class="chat-card">

  <!-- BACK -->
  <button class="back-btn" onclick="history.back()">&larr; Back</button>

  <h2>
    Booking #{{ booking.id }}
    {% if booking_type %} &middot; {{ booking_type|title }} {% endif %}
  </h2>

  <hr style="border:none;border-top:1px solid #eee;margin:10px 0;" />

  <!-- THREAD -->
  <div class="chat-thread" id="chatThread">
    {% for m in messages %}
      <article class="message {% if m.sender_id == request.user.id %}message--out{% else %}message--in{% endif %}">
        <div class="message__bubble">
          {{ m.text|linebreaksbr }}
          {% if m.file %}
            <div><a href="{{ m.file.url }}" target="_blank">Attachment</a></div>
          {% endif %}
        </div>
        <div class="message__meta">
          {{ m.created_at|date:"h:i A" }}
        </div>
      </article>
    {% empty %}
      <p style="opacity:.6;">No messages yet...</p>
    {% endfor %}
  </div>

  <!-- COMPOSER -->
  <form class="composer" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label class="icon-btn" title="Attach file">
      &#128206;
      <input type="file" name="file" hidden>
    </label>

    <input
      id="chat-input"
      name="message"
      type="text"
      placeholder="Type a message..."
      required
    >

<button type="button" id="emoji-btn" class="icon-btn" aria-label="Emoji">&#9786;</button>

<emoji-picker id="emoji-picker" style="
  display:none;
  position:absolute;
  bottom:60px;
  right:80px;
  z-index:999;
"></emoji-picker>


    <button class="send-btn" type="submit">Send</button>
  </form>

</section>

<!-- Emoji Library -->
<script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.4/dist/index.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const input  = document.getElementById("chat-input");
  const btn    = document.getElementById("emoji-btn");
  const picker = document.getElementById("emoji-picker");

  // ظپطھط­ / ط¥ط؛ظ„ط§ظ‚ ط¹ظ†ط¯ ط§ظ„ط¶ط؛ط· ط¹ظ„ظ‰ ط§ظ„ط²ط±
  btn.addEventListener("click", (e) => {
    e.stopPropagation(); // ظ…ظ‡ظ…
    picker.style.display =
      picker.style.display === "none"  "block" : "none";
  });

  // ط¥ط¯ط®ط§ظ„ ط§ظ„ط¥ظٹظ…ظˆط¬ظٹ
  picker.addEventListener("emoji-click", event => {
    input.value += event.detail.unicode;
    input.focus();
  });

  // ًں‘ˆ ط¥ط؛ظ„ط§ظ‚ ط§ظ„ط¥ظٹظ…ظˆط¬ظٹ ط¹ظ†ط¯ ط§ظ„ط¶ط؛ط· ط®ط§ط±ط¬ظ‡ط§
  document.addEventListener("click", (e) => {
    if (
      picker.style.display === "block" &&
      !picker.contains(e.target) &&
      !btn.contains(e.target)
    ) {
      picker.style.display = "none";
    }
  });

});
</script>

<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
