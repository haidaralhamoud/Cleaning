{% extends "base.html" %}

{% block title %}Password Updated{% endblock %}

{% block content %}
<section style="max-width: 720px; margin: 120px auto 80px; padding: 32px; background: #fff; border-radius: 18px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); text-align: center;">
  <h1 style="margin-bottom: 16px;">Password changed successfully</h1>
  <p style="margin-bottom: 24px; color: #475569;">
    Your provider account password has been updated.
  </p>
  <a href="{% url 'accounts:provider_profile' %}" style="display: inline-block; padding: 12px 22px; border-radius: 12px; background: #039fc8; color: #fff; text-decoration: none; font-weight: 700;">
    Back to Provider Profile
  </a>
</section>
{% endblock %}
