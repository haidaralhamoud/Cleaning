{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Processing | Hembla Experten</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/main_header.css' %}">
  <style>
    .payment-status {
      max-width: 800px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px;
      border: 1px solid rgba(3, 159, 200, 0.2);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .payment-status h1 {
      font-family: "Vesper Libre", serif;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .payment-status p {
      color: #475569;
      font-size: 16px;
      margin: 12px 0 24px;
    }
    .payment-status button {
      display: inline-block;
      background: #039fc8;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
{% include "home/includes/main_header.html" %}

<div class="payment-status">
  <h1>Payment received</h1>
  <p>Payment received. Once Stripe confirms the transaction, your order will be completed. You may close this page. A confirmation email will be sent shortly.</p>
  <button type="button" id="payment-close-btn">Close</button>
</div>

<script>
  (function () {
    const fallbackUrl = "{{ fallback_url|escapejs }}";
    const paymentIntentId = "{{ payment_intent_id|escapejs }}";
    const button = document.getElementById("payment-close-btn");
    let refreshAttempts = 0;
    const maxRefreshAttempts = 24;

    function goToBestDestination() {
      if (window.opener && !window.opener.closed) {
        window.close();
        return;
      }

      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = fallbackUrl;
    }

    if (button) {
      button.addEventListener("click", goToBestDestination);
    }

    function pollForCompletion() {
      if (!paymentIntentId || refreshAttempts >= maxRefreshAttempts) {
        return;
      }
      refreshAttempts += 1;
      window.setTimeout(function () {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("payment_intent_id", paymentIntentId);
        nextUrl.searchParams.set("poll", String(refreshAttempts));
        window.location.replace(nextUrl.toString());
      }, 5000);
    }

    pollForCompletion();
  })();
</script>

</body>
</html>
