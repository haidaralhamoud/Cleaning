{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
  <title>Payment Failed | Hembla Experten</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/main_header.css' %}">
  <style>
    .payment-status {
      max-width: 800px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px;
      border: 1px solid rgba(3, 159, 200, 0.2);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .payment-status h1 {
      font-family: "Vesper Libre", serif;
      font-size: 32px;
      margin-bottom: 10px;
      color: #c0392b;
    }
    .payment-status p {
      color: #475569;
      font-size: 16px;
      margin: 12px 0 24px;
    }
    .payment-status a {
      display: inline-block;
      background: #039fc8;
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
{% include "home/includes/main_header.html" %}

<div class="payment-status">
  <h1>Payment failed</h1>
  <p>We could not complete your payment. Please try again or use a different card.</p>
  <a href="{% url 'home:private_booking_checkout' %}">Try payment again</a>
</div>

</body>
</html>
